<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>스마트타이머 - Smart Timer Deck</title>
  
  <!-- 1. Tailwind CSS 플레이 CDN 적용 -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 2. 가독성 높은 구글 폰트(Inter, Noto Sans KR, JetBrains Mono) 및 스타일 지정 -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;700;800&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
  
  <!-- 3. Lucide 아이콘 패키지 CDN 로드 -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    body {
      font-family: 'Inter', 'Noto Sans KR', sans-serif;
    }
    .font-mono {
      font-family: 'JetBrains Mono', monospace;
    }
    /* 미세 그리드 격자 무늬 배경 데코레이션 */
    .grid-bg {
      background-image: 
        linear-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
      background-size: 24px 24px;
    }
    /* 서서히 돌아가는 아이콘 애니메이션 */
    @keyframes spin-slow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .animate-spin-slow {
      animation: spin-slow 12s linear infinite;
    }
    /* 크롬 슬라이더 기본 디자인 커스텀 */
    input[type="range"]::-webkit-slider-thumb {
      background: #22d3ee;
      box-shadow: 0 0 8px rgba(34, 211, 238, 0.8);
    }
  </style>
</head>
<body class="min-h-screen bg-[#070913] text-slate-100 flex flex-col items-center justify-center p-4 relative overflow-hidden select-none">

  <!-- 백그라운드 우주 아우라 광원 장식 -->
  <div class="absolute top-1/4 left-1/4 -translate-x-1/2 -translate-y-1/2 w-[350px] sm:w-[500px] h-[350px] sm:h-[500px] rounded-full bg-indigo-600/20 blur-[80px] sm:blur-[120px] pointer-events-none"></div>
  <div class="absolute bottom-1/4 right-1/4 translate-x-1/2 translate-y-1/2 w-[300px] sm:w-[450px] h-[300px] sm:h-[450px] rounded-full bg-pink-600/15 blur-[90px] sm:blur-[130px] pointer-events-none"></div>
  <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] rounded-full bg-cyan-500/10 blur-[150px] pointer-events-none"></div>
  
  <!-- 그리드 레이어 -->
  <div class="absolute inset-0 grid-bg pointer-events-none"></div>

  <!-- 메인 스마트 타임 덱 카드 -->
  <div id="timer-card" class="relative bg-slate-900/90 backdrop-blur-2xl border-2 border-white/15 shadow-[0_0_80px_rgba(99,102,241,0.2)] rounded-[32px] p-6 sm:p-7 max-w-md w-full overflow-hidden z-10">
    
    <!-- 상단 장식 네온 라인 -->
    <div class="absolute top-0 inset-x-0 h-[2px] bg-gradient-to-r from-transparent via-cyan-400/80 to-transparent"></div>
    <div class="absolute top-1.5 right-4 text-[9px] font-mono text-cyan-400/50 select-none tracking-widest font-bold">SMART_DECK_V2</div>

    <!-- 1. 헤더: 오늘 날짜 및 헤더 -->
    <div class="flex flex-col items-center text-center mt-1 mb-5">
      <!-- 하이테크 스타일 오늘 날짜 패널 (한국어 + 미국 뉴욕) -->
      <div class="flex flex-col items-center gap-1.5 text-xs font-mono text-cyan-300 bg-slate-950 px-4 py-3 rounded-2xl border border-white/10 mb-4 w-full shadow-[inset_0_1px_4px_rgba(0,0,0,0.6)]">
        <div class="flex items-center gap-1.5">
          <i data-lucide="calendar" class="text-cyan-400 w-3.5 h-3.5"></i>
          <span id="today-date" class="text-slate-100 font-bold tracking-tight">날짜 동기화 중...</span>
        </div>
        <div class="flex items-center gap-1.5 text-[10px] text-indigo-300 font-semibold tracking-wider border-t border-white/5 pt-1.5 w-full justify-center">
          <span class="text-indigo-400">🇺🇸 US EST:</span>
          <span id="us-today-date" class="uppercase font-bold text-slate-200">LOADING...</span>
        </div>
      </div>

      <h1 class="text-2xl font-black text-white tracking-[0.12em] uppercase flex items-center gap-2">
        <i data-lucide="clock" class="text-cyan-400 animate-spin-slow w-5 h-5"></i>
        스마트타이머
      </h1>
      <div class="text-[10px] font-mono font-bold text-slate-400 mt-1 tracking-widest uppercase">INTELLIGENT TIMER DECK</div>
    </div>

    <!-- 2. 거대 LCD 시간 표시 화면 -->
    <div class="relative flex flex-col items-center justify-center bg-black border-2 border-white/10 rounded-2xl p-6 shadow-[inset_0_3px_15px_rgba(0,0,0,1)] mb-5">
      <!-- 타이머 진행 상황 빔 트랙 -->
      <div class="absolute inset-x-0 bottom-0 h-1 bg-slate-900 overflow-hidden rounded-b-2xl">
        <div id="progress-bar" class="h-full bg-gradient-to-r from-cyan-400 via-indigo-500 to-pink-500 shadow-[0_0_10px_rgba(34,211,238,0.7)] transition-all duration-300" style="width: 0%"></div>
      </div>

      <!-- 거대 타이머 수치 -->
      <div id="time-string" class="text-6xl font-mono font-black tracking-tight transition-all duration-300 drop-shadow-[0_2px_10px_rgba(0,0,0,0.5)] text-cyan-400 drop-shadow-[0_0_12px_rgba(34,211,238,0.4)]">
        05:00
      </div>

      <!-- 시스템 상태 콘솔 뱃지 -->
      <div id="status-badge" class="mt-3.5 text-xs font-mono font-bold px-4 py-1.5 rounded-lg border text-indigo-300 bg-indigo-950/70 border-indigo-500/40 transition-all duration-300 tracking-wider">
        대기 중 (STANDBY)
      </div>
    </div>

    <!-- 3. 원터치 퀵 프리셋 대시 -->
    <div class="mb-4">
      <div class="flex items-center gap-1.5 mb-2">
        <i data-lucide="zap" class="text-cyan-400 w-3.5 h-3.5"></i>
        <span class="text-xs font-mono font-bold text-slate-300 tracking-wider uppercase">원터치 퀵 프리셋</span>
      </div>
      <div class="grid grid-cols-4 gap-2">
        <button onclick="applyPreset(25)" id="preset-pomodoro" class="preset-btn py-2 px-1 rounded-xl border-2 text-center transition-all duration-300 cursor-pointer flex flex-col items-center justify-center bg-white/[0.02] border-white/10 text-slate-200 hover:bg-slate-900 hover:border-white/20">
          <span class="text-base mb-0.5">🍅</span>
          <span class="text-xs font-bold">집중</span>
          <span class="text-xs text-cyan-300 font-mono font-extrabold mt-0.5">25분</span>
        </button>
        <button onclick="applyPreset(5)" id="preset-short" class="preset-btn py-2 px-1 rounded-xl border-2 text-center transition-all duration-300 cursor-pointer flex flex-col items-center justify-center bg-white/[0.02] border-white/10 text-slate-200 hover:bg-slate-900 hover:border-white/20">
          <span class="text-base mb-0.5">☕</span>
          <span class="text-xs font-bold">휴식</span>
          <span class="text-xs text-cyan-300 font-mono font-extrabold mt-0.5">5분</span>
        </button>
        <button onclick="applyPreset(15)" id="preset-long" class="preset-btn py-2 px-1 rounded-xl border-2 text-center transition-all duration-300 cursor-pointer flex flex-col items-center justify-center bg-white/[0.02] border-white/10 text-slate-200 hover:bg-slate-900 hover:border-white/20">
          <span class="text-base mb-0.5">🌳</span>
          <span class="text-xs font-bold">리프레시</span>
          <span class="text-xs text-cyan-300 font-mono font-extrabold mt-0.5">15분</span>
        </button>
        <button onclick="applyPreset(50)" id="preset-intensive" class="preset-btn py-2 px-1 rounded-xl border-2 text-center transition-all duration-300 cursor-pointer flex flex-col items-center justify-center bg-white/[0.02] border-white/10 text-slate-200 hover:bg-slate-900 hover:border-white/20">
          <span class="text-base mb-0.5">🔥</span>
          <span class="text-xs font-bold">몰입</span>
          <span class="text-xs text-cyan-300 font-mono font-extrabold mt-0.5">50분</span>
        </button>
      </div>
    </div>

    <!-- 4. 정밀 타이머 설정 영역 -->
    <div class="mb-4 space-y-2">
      <div class="flex items-center justify-between text-xs font-mono font-bold text-slate-300 tracking-wider uppercase">
        <span class="flex items-center gap-1">
          <i data-lucide="sparkles" class="text-cyan-400 w-3 h-3"></i>
          정밀 타이머 설정 (1 - 99분)
        </span>
        <span id="current-setting-text" class="text-cyan-300 font-extrabold">5분 설정됨</span>
      </div>

      <div class="space-y-3 p-3.5 bg-slate-950 border-2 border-white/10 rounded-2xl shadow-[inset_0_2px_6px_rgba(0,0,0,0.8)]">
        <div class="flex gap-3 items-center">
          <!-- 숫자 정밀 입력창 -->
          <input 
            id="duration-number-input"
            type="number" 
            min="1" 
            max="99"
            value="5"
            oninput="handleDurationChange(parseInt(this.value) || 0)"
            class="w-16 h-9 text-center text-sm font-mono font-black text-cyan-300 bg-slate-900 border-2 border-white/15 rounded-xl focus:outline-none focus:ring-2 focus:ring-cyan-400 focus:border-cyan-400"
          />
          <!-- 슬라이더 조절기 -->
          <input 
            id="duration-range-slider"
            type="range" 
            min="1" 
            max="99" 
            value="5"
            oninput="handleDurationChange(parseInt(this.value) || 1)"
            class="flex-1 h-2 bg-slate-800 rounded-lg appearance-none cursor-pointer accent-cyan-400"
          />
        </div>

        <!-- 빠른 증감 버튼군 -->
        <div class="grid grid-cols-4 gap-2">
          <button onclick="adjustDuration(-5)" class="py-1.5 text-xs font-mono font-bold text-slate-200 bg-slate-900 border-2 border-white/10 rounded-xl hover:bg-slate-800 hover:border-white/25 transition flex items-center justify-center gap-0.5 cursor-pointer">
            <i data-lucide="minus" class="w-3 h-3 text-pink-400"></i>5분
          </button>
          <button onclick="adjustDuration(-1)" class="py-1.5 text-xs font-mono font-bold text-slate-200 bg-slate-900 border-2 border-white/10 rounded-xl hover:bg-slate-800 hover:border-white/25 transition flex items-center justify-center gap-0.5 cursor-pointer">
            <i data-lucide="minus" class="w-3 h-3 text-pink-400"></i>1분
          </button>
          <button onclick="adjustDuration(1)" class="py-1.5 text-xs font-mono font-bold text-slate-200 bg-slate-900 border-2 border-white/10 rounded-xl hover:bg-slate-800 hover:border-white/25 transition flex items-center justify-center gap-0.5 cursor-pointer">
            <i data-lucide="plus" class="w-3 h-3 text-cyan-400"></i>1분
          </button>
          <button onclick="adjustDuration(5)" class="py-1.5 text-xs font-mono font-bold text-slate-200 bg-slate-900 border-2 border-white/10 rounded-xl hover:bg-slate-800 hover:border-white/25 transition flex items-center justify-center gap-0.5 cursor-pointer">
            <i data-lucide="plus" class="w-3 h-3 text-cyan-400"></i>5분
          </button>
        </div>
      </div>
    </div>

    <!-- 5. 메인 시스템 컨트롤러 스위치 -->
    <div class="space-y-2">
      <div class="grid grid-cols-3 gap-2.5">
        <!-- 시작 -->
        <button id="btn-start" onclick="startTimer()" class="py-3.5 px-3 rounded-xl text-xs font-mono font-black uppercase shadow-lg flex items-center justify-center gap-1.5 transition-all duration-300 tracking-wider bg-cyan-400 text-black hover:bg-cyan-300 active:scale-95 cursor-pointer shadow-[0_0_15px_rgba(34,211,238,0.4)] hover:shadow-[0_0_20px_rgba(34,211,238,0.6)]">
          <i data-lucide="play" class="w-3 h-3 fill-current"></i>시작
        </button>

        <!-- 일시정지 -->
        <button id="btn-pause" onclick="pauseTimer()" disabled class="py-3.5 px-3 rounded-xl text-xs font-mono font-black uppercase shadow-lg flex items-center justify-center gap-1.5 transition-all duration-300 tracking-wider bg-slate-950 text-slate-600 border-2 border-slate-800 cursor-not-allowed shadow-none">
          <i data-lucide="pause" class="w-3 h-3 fill-current"></i>일시정지
        </button>

        <!-- 초기화 -->
        <button id="btn-reset" onclick="resetTimer()" class="py-3.5 px-3 rounded-xl text-xs font-mono font-black uppercase bg-slate-900 text-slate-100 border-2 border-white/10 hover:border-white/25 active:scale-95 transition-all duration-300 flex items-center justify-center gap-1.5 cursor-pointer hover:bg-slate-800">
          <i data-lucide="rotate-ccw" class="w-3 h-3"></i>초기화
        </button>
      </div>

      <!-- 알림음 정지 버튼 (알람 재생 시에만 출력) -->
      <button id="btn-stop-alarm" onclick="stopAlarm()" class="hidden w-full py-3 px-3 rounded-xl text-xs font-mono font-black uppercase text-white bg-gradient-to-r from-rose-600 to-pink-600 shadow-xl shadow-rose-950/50 flex items-center justify-center gap-1.5 animate-bounce cursor-pointer">
        <i data-lucide="volume-x" class="w-3.5 h-3.5"></i>알림음 정지
      </button>
    </div>

    <!-- 6. 하이테크 글로벌 타임존 패널 -->
    <div class="mt-4 pt-4 border-t-2 border-white/10">
      <div class="flex items-center gap-1.5 mb-2.5">
        <i data-lucide="globe" class="text-cyan-400 w-3 h-3"></i>
        <span class="text-xs font-mono font-bold text-slate-300 tracking-wider uppercase">글로벌 관측 타임존</span>
      </div>
      
      <div class="grid grid-cols-3 gap-2" id="world-clock-grid">
        <!-- JS에 의해 각 타임존 카드가 빌드됩니다. -->
      </div>
    </div>

    <!-- 7. 카드 내부 하단 고대비 크레딧 및 인스타그램 연결 -->
    <div class="mt-5 pt-3.5 border-t-2 border-white/10 text-center text-xs text-slate-400 font-medium flex flex-col items-center gap-2">
      <div class="font-mono text-[10px] tracking-wider text-slate-400 uppercase">
        제작자: <span class="text-white font-black hover:text-cyan-300 transition-colors duration-300">HYEWON</span>
      </div>
      <a 
        href="https://www.instagram.com/rose_ai_log/" 
        target="_blank" 
        rel="noopener noreferrer"
        className="flex items-center gap-1.5 text-pink-400 hover:text-pink-300 transition-all duration-300 bg-slate-950 hover:bg-pink-950/40 px-4 py-2 rounded-full border border-pink-500/30 hover:border-pink-500/60 font-sans text-[10px] tracking-wider shadow-[0_0_10px_rgba(236,72,153,0.15)] hover:shadow-[0_0_15px_rgba(236,72,153,0.3)] font-bold cursor-pointer"
          >
        <i data-lucide="instagram" class="text-pink-500 animate-pulse w-3 h-3"></i>
       <span>인스타그램 바로가기 (@rose_ai_log) ↗</span>
      </a>
    </div>

  </div>

  <!-- 8. 웹 앱 코어 스크립트 (Vanilla JS) -->
  <script>
    // 1. 상태 변수 정의
    let durationMinutes = 5;
    let timeLeftSeconds = 5 * 60;
    let timerStatus = "idle"; // 'idle' | 'running' | 'paused' | 'finished'
    let isAlarmPlaying = false;

    let timerInterval = null;
    let beepInterval = null;
    let audioCtx = null;

    // 타임존 구성 정보
    const timeZones = [
      { id: "seoul", cityKo: "서울", zone: "Asia/Seoul", flag: "🇰🇷", offset: "KST" },
      { id: "tokyo", cityKo: "도쿄", zone: "Asia/Tokyo", flag: "🇯🇵", offset: "JST" },
      { id: "newyork", cityKo: "뉴욕", zone: "America/New_York", flag: "🇺🇸", offset: "EST" },
      { id: "losangeles", cityKo: "LA", zone: "America/Los_Angeles", flag: "🇺🇸", offset: "PST" },
      { id: "london", cityKo: "런던", zone: "Europe/London", flag: "🇬🇧", offset: "GMT" },
      { id: "paris", cityKo: "파리", zone: "Europe/Paris", flag: "🇫🇷", offset: "CET" },
    ];

    // 2. 초기 렌더링 및 글로벌 시계 구축
    function initWorldClocks() {
      const grid = document.getElementById("world-clock-grid");
      grid.innerHTML = timeZones.map(tz => `
        <div id="tz-${tz.id}" class="p-2.5 bg-slate-950 border-2 border-white/5 hover:border-white/15 transition-all duration-300 rounded-xl flex flex-col justify-between shadow-[inset_0_1px_3px_rgba(0,0,0,0.8)]">
          <div class="flex items-center justify-between mb-1 border-b border-white/5 pb-1">
            <span class="text-xs font-bold text-slate-100 flex items-center gap-0.5">
              <span class="text-xs leading-none select-none">${tz.flag}</span>
              ${tz.cityKo}
            </span>
            <span id="icon-${tz.id}"><i data-lucide="sun" class="text-amber-400 w-2.5 h-2.5"></i></span>
          </div>
          <div class="flex items-baseline justify-between mt-1">
            <span id="time-${tz.id}" class="font-mono text-sm font-black text-cyan-300 tracking-tight drop-shadow-[0_1px_5px_rgba(34,211,238,0.2)]">--:--</span>
            <span class="text-[8px] font-mono text-indigo-300 font-extrabold uppercase">${tz.offset}</span>
          </div>
        </div>
      `).join('');
      lucide.createIcons();
    }

    // 시간 포맷화 (MM:SS)
    function formatTime(totalSeconds) {
      const mins = Math.floor(totalSeconds / 60);
      const secs = totalSeconds % 60;
      return `${mins < 10 ? '0' + mins : mins}:${secs < 10 ? '0' + secs : secs}`;
    }

    // 낮과 밤을 판단하는 로직 (오전 6시 ~ 오후 6시 = 낮)
    function checkIsDaytime(timeStr) {
      if (!timeStr || timeStr.includes("--")) return true;
      const hour = parseInt(timeStr.split(":")[0]);
      return hour >= 6 && hour < 18;
    }

    // 3. UI 실시간 동기화 업데이트 함수
    function updateUI() {
      // 시간 표시 변경
      const timeDisplay = document.getElementById("time-string");
      timeDisplay.innerText = formatTime(timeLeftSeconds);

      if (timerStatus === "finished") {
        timeDisplay.className = "text-6xl font-mono font-black tracking-tight transition-all duration-300 drop-shadow-[0_2px_10px_rgba(0,0,0,0.5)] text-rose-500 drop-shadow-[0_0_20px_rgba(244,63,94,0.8)] animate-pulse";
      } else {
        timeDisplay.className = "text-6xl font-mono font-black tracking-tight transition-all duration-300 drop-shadow-[0_2px_10px_rgba(0,0,0,0.5)] text-cyan-400 drop-shadow-[0_0_12px_rgba(34,211,238,0.4)]";
      }

      // 상태 메시지 뱃지 갱신
      const statusBadge = document.getElementById("status-badge");
      if (timerStatus === "running") {
        statusBadge.innerText = "타이머 작동 중 (ONLINE)";
        statusBadge.className = "mt-3.5 text-xs font-mono font-bold px-4 py-1.5 rounded-lg border text-emerald-400 bg-emerald-950/70 border-emerald-500/50 shadow-[0_0_12px_rgba(16,185,129,0.2)] tracking-wider";
      } else if (timerStatus === "paused") {
        statusBadge.innerText = "일시정지됨 (PAUSED)";
        statusBadge.className = "mt-3.5 text-xs font-mono font-bold px-4 py-1.5 rounded-lg border text-amber-400 bg-amber-950/70 border-amber-500/50 shadow-[0_0_12px_rgba(245,158,11,0.2)] tracking-wider";
      } else if (timerStatus === "finished") {
        statusBadge.innerText = "시간 종료! 알람 작동 중";
        statusBadge.className = "mt-3.5 text-xs font-mono font-bold px-4 py-1.5 rounded-lg border text-rose-100 bg-rose-700 border-rose-500 animate-pulse shadow-[0_0_20px_rgba(244,63,94,0.5)] tracking-wider";
      } else {
        statusBadge.innerText = "대기 중 (STANDBY)";
        statusBadge.className = "mt-3.5 text-xs font-mono font-bold px-4 py-1.5 rounded-lg border text-indigo-300 bg-indigo-950/70 border-indigo-500/40 tracking-wider";
      }

      // 프로그레스바 갱신
      const totalInitial = durationMinutes * 60;
      const percent = totalInitial > 0 ? ((totalInitial - timeLeftSeconds) / totalInitial) * 100 : 0;
      document.getElementById("progress-bar").style.width = `${percent}%`;

      // 인풋 및 슬라이더 활성화 상태 제어
      const numInput = document.getElementById("duration-number-input");
      const rangeSlider = document.getElementById("duration-range-slider");
      numInput.value = durationMinutes;
      rangeSlider.value = durationMinutes;
      document.getElementById("current-setting-text").innerText = `${durationMinutes}분 설정됨`;

      if (timerStatus === "idle") {
        numInput.removeAttribute("disabled");
        rangeSlider.removeAttribute("disabled");
      } else {
        numInput.setAttribute("disabled", "true");
        rangeSlider.setAttribute("disabled", "true");
      }

      // 프리셋 활성 스타일 부여
      document.querySelectorAll(".preset-btn").forEach(btn => {
        btn.className = "preset-btn py-2 px-1 rounded-xl border-2 text-center transition-all duration-300 cursor-pointer flex flex-col items-center justify-center bg-white/[0.02] border-white/10 text-slate-200 hover:bg-slate-900 hover:border-white/20";
      });
      if (timerStatus === "idle") {
        let activePresetId = "";
        if (durationMinutes === 25) activePresetId = "preset-pomodoro";
        else if (durationMinutes === 5) activePresetId = "preset-short";
        else if (durationMinutes === 15) activePresetId = "preset-long";
        else if (durationMinutes === 50) activePresetId = "preset-intensive";

        if (activePresetId) {
          const activeBtn = document.getElementById(activePresetId);
          if (activeBtn) {
            activeBtn.className = "preset-btn py-2 px-1 rounded-xl border-2 text-center transition-all duration-300 cursor-pointer flex flex-col items-center justify-center bg-indigo-500/20 border-cyan-400 text-white shadow-[0_0_12px_rgba(34,211,238,0.25)] ring-1 ring-cyan-400/50";
          }
        }
      }

      // 시작 / 일시정지 조작 버튼 상태 동기화
      const btnStart = document.getElementById("btn-start");
      const btnPause = document.getElementById("btn-pause");
      if (timerStatus === "running") {
        btnStart.setAttribute("disabled", "true");
        btnStart.className = "py-3.5 px-3 rounded-xl text-xs font-mono font-black uppercase shadow-lg flex items-center justify-center gap-1.5 transition-all duration-300 tracking-wider bg-slate-950 text-slate-600 border-2 border-slate-800 cursor-not-allowed shadow-none";
        
        btnPause.removeAttribute("disabled");
        btnPause.className = "py-3.5 px-3 rounded-xl text-xs font-mono font-black uppercase shadow-lg flex items-center justify-center gap-1.5 transition-all duration-300 tracking-wider bg-amber-500 text-black hover:bg-amber-400 active:scale-95 cursor-pointer shadow-[0_0_15px_rgba(245,158,11,0.3)] hover:shadow-[0_0_20px_rgba(245,158,11,0.5)] font-extrabold";
      } else if (timerStatus === "paused" || timerStatus === "idle" || timerStatus === "finished") {
        btnStart.removeAttribute("disabled");
        btnStart.className = "py-3.5 px-3 rounded-xl text-xs font-mono font-black uppercase shadow-lg flex items-center justify-center gap-1.5 transition-all duration-300 tracking-wider bg-cyan-400 text-black hover:bg-cyan-300 active:scale-95 cursor-pointer shadow-[0_0_15px_rgba(34,211,238,0.4)] hover:shadow-[0_0_20px_rgba(34,211,238,0.6)] font-extrabold";
        
        btnPause.setAttribute("disabled", "true");
        btnPause.className = "py-3.5 px-3 rounded-xl text-xs font-mono font-black uppercase shadow-lg flex items-center justify-center gap-1.5 transition-all duration-300 tracking-wider bg-slate-950 text-slate-600 border-2 border-slate-800 cursor-not-allowed shadow-none";
      }

      // 알림음 정지 버튼 보이기/감추기
      const btnStopAlarm = document.getElementById("btn-stop-alarm");
      if (isAlarmPlaying) {
        btnStopAlarm.classList.remove("hidden");
      } else {
        btnStopAlarm.classList.add("hidden");
      }
    }

    // 4. 타이머 제어 비즈니스 로직
    function handleDurationChange(val) {
      let corrected = val;
      if (val > 99) corrected = 99;
      if (val < 1) corrected = 1;

      durationMinutes = corrected;
      if (timerStatus === "idle") {
        timeLeftSeconds = corrected * 60;
      }
      updateUI();
    }

    function adjustDuration(amount) {
      if (timerStatus !== "idle") return;
      handleDurationChange(durationMinutes + amount);
    }

    function applyPreset(minutes) {
      if (timerStatus !== "idle") {
        clearInterval(timerInterval);
        stopAlarm();
      }
      durationMinutes = minutes;
      timeLeftSeconds = minutes * 60;
      timerStatus = "idle";
      updateUI();
    }

    function startTimer() {
      if (timerStatus === "running") return;

      // 브라우저 소리 제한 해제 목적의 AudioContext 웜업
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === "suspended") {
        audioCtx.resume();
      }

      timerStatus = "running";
      updateUI();

      timerInterval = setInterval(() => {
        if (timeLeftSeconds <= 1) {
          clearInterval(timerInterval);
          timeLeftSeconds = 0;
          timerStatus = "finished";
          triggerAlarm();
          updateUI();
          return;
        }
        timeLeftSeconds--;
        updateUI();
      }, 1000);
    }

    function pauseTimer() {
      if (timerStatus !== "running") return;
      clearInterval(timerInterval);
      timerStatus = "paused";
      updateUI();
    }

    function resetTimer() {
      clearInterval(timerInterval);
      stopAlarm();
      timerStatus = "idle";
      timeLeftSeconds = durationMinutes * 60;
      updateUI();
    }

    // 5. Web Audio API 기반 오디오 합성 및 5회 비프 알람 경고 루프
    function triggerAlarm() {
      isAlarmPlaying = true;
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === "suspended") {
        audioCtx.resume();
      }

      const playSingleBeep = () => {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();

        osc.type = "sine";
        osc.frequency.setValueAtTime(880, audioCtx.currentTime); // 맑고 선명한 880Hz 비프 신호음

        gain.gain.setValueAtTime(0, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + 0.05);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.4);

        osc.connect(gain);
        gain.connect(audioCtx.destination);

        osc.start();
        osc.stop(audioCtx.currentTime + 0.5);
      };

      if (beepInterval) clearInterval(beepInterval);

      let count = 0;
      playSingleBeep();
      count++;

      beepInterval = setInterval(() => {
        if (count >= 5) {
          clearInterval(beepInterval);
          beepInterval = null;
          isAlarmPlaying = false;
          updateUI();
          return;
        }
        playSingleBeep();
        count++;
      }, 1000);
    }

    function stopAlarm() {
      if (beepInterval) {
        clearInterval(beepInterval);
        beepInterval = null;
      }
      isAlarmPlaying = false;
      updateUI();
    }

    // 6. 실시간 날짜 정보 및 글로벌 관측 타임존 업데이트 루틴
    function updateDateAndTimes() {
      const date = new Date();
      const days = ["일요일", "월요일", "화요일", "수요일", "목요일", "금요일", "토요일"];
      const year = date.getFullYear();
      const month = date.getMonth() + 1;
      const day = date.getDate();
      const dayOfWeek = days[date.getDay()];
      document.getElementById("today-date").innerText = `${year}년 ${month}월 ${day}일 ${dayOfWeek}`;

      // 미국 뉴욕 동부 표준시 날짜 갱신
      try {
        const options = {
          timeZone: "America/New_York",
          year: "numeric",
          month: "long",
          day: "numeric",
          weekday: "long"
        };
        document.getElementById("us-today-date").innerText = new Intl.DateTimeFormat("en-US", options).format(date);
      } catch (e) {
        document.getElementById("us-today-date").innerText = "DATETIME ERROR";
      }

      // 글로벌 6대 도시 실시간 시계 동기화
      timeZones.forEach(tz => {
        try {
          const timeStr = new Intl.DateTimeFormat("ko-KR", {
            timeZone: tz.zone,
            hour: "2-digit",
            minute: "2-digit",
            hour12: false,
          }).format(date);

          document.getElementById(`time-${tz.id}`).innerText = timeStr;

          // 낮과 밤에 따라 선/문 아이콘을 동적으로 주입
          const isDay = checkIsDaytime(timeStr);
          const iconContainer = document.getElementById(`icon-${tz.id}`);
          if (isDay) {
            iconContainer.innerHTML = '<i data-lucide="sun" class="text-amber-400 w-3 h-3"></i>';
          } else {
            iconContainer.innerHTML = '<i data-lucide="moon" class="text-indigo-300 w-3 h-3"></i>';
          }
        } catch (e) {
          document.getElementById(`time-${tz.id}`).innerText = "--:--";
        }
      });
      lucide.createIcons();
    }

    // 초기 로딩 진입점
    window.addEventListener("DOMContentLoaded", () => {
      initWorldClocks();
      updateDateAndTimes();
      updateUI();
      setInterval(updateDateAndTimes, 1000);
    });
  </script>
